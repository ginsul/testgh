name: Build iOS App

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  push:
    tags:
      - 'release-v*'

jobs:
  build-ios:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (github.event.comment.body == '/build-ios' || startsWith(github.event.comment.body, '/build-ios ')))
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - brand: galaxy
            environment: prod
          - brand: greey
            environment: prod
    steps:
      - name: Check brand filter
        id: brand-filter
        if: github.event_name == 'issue_comment'
        run: |
          COMMENT="${{ github.event.comment.body }}"
          BRAND="${{ matrix.brand }}"
          # Extract brand argument: "/build-ios glchat" → "glchat"
          REQUESTED_BRAND=$(echo "$COMMENT" | awk '{print $2}')
          if [ -n "$REQUESTED_BRAND" ] && [ "$REQUESTED_BRAND" != "$BRAND" ]; then
            echo "Skipping $BRAND (requested: $REQUESTED_BRAND)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Building $BRAND"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.brand-filter.outputs.skip != 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      - name: Inject Version
        if: github.event_name == 'push' && steps.brand-filter.outputs.skip != 'true'
        run: chmod +x build.ci.sh inject-version.sh && ./inject-version.sh
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Build
        if: steps.brand-filter.outputs.skip != 'true'
        run: |
          chmod +x build.ci.sh inject-version.sh && ./build.ci.sh
        env:
          RUN_BUILD_ONLY: true
          ENVIRONMENT: ${{ matrix.environment }}
          BRAND: ${{ matrix.brand }}
          PLATFORM: ios
          SKIP_TESTFLIGHT: ${{ github.event_name != 'push' && 'true' || 'false' }}
