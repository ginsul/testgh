name: Build iOS App

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  push:
    tags:
      - 'release-v*'

jobs:
  gate:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (github.event.comment.body == '/build-ios' || startsWith(github.event.comment.body, '/build-ios ')))
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine build matrix
        id: set-matrix
        run: |
          ALL_BRANDS='[{"brand":"glchat","environment":"prod"},{"brand":"catapa","environment":"prod"}]'

          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT="${{ github.event.comment.body }}"
            # Extract brand argument: "/build-ios glchat" → "glchat"
            REQUESTED_BRAND=$(echo "$COMMENT" | awk '{print $2}')
            if [ -n "$REQUESTED_BRAND" ]; then
              echo "Filtering matrix for brand: $REQUESTED_BRAND"
              MATRIX=$(echo "$ALL_BRANDS" | jq -c --arg brand "$REQUESTED_BRAND" '[.[] | select(.brand == $brand)]')
              if [ "$MATRIX" = "[]" ]; then
                echo "::error::Unknown brand '$REQUESTED_BRAND'. Valid brands: glchat, catapa"
                exit 1
              fi
            else
              MATRIX="$ALL_BRANDS"
            fi
          else
            MATRIX="$ALL_BRANDS"
          fi

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $MATRIX"

  build-ios:
    needs: gate
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.gate.outputs.matrix) }}
    steps:
      - name: Check brand filter
        id: brand-filter
        if: github.event_name == 'issue_comment'
        run: |
          COMMENT="${{ github.event.comment.body }}"
          BRAND="${{ matrix.brand }}"
          # Extract brand argument: "/build-ios glchat" → "glchat"
          REQUESTED_BRAND=$(echo "$COMMENT" | awk '{print $2}')
          if [ -n "$REQUESTED_BRAND" ] && [ "$REQUESTED_BRAND" != "$BRAND" ]; then
            echo "Skipping $BRAND (requested: $REQUESTED_BRAND)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Building $BRAND"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.brand-filter.outputs.skip != 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      - name: Inject Version
        if: github.event_name == 'push' && steps.brand-filter.outputs.skip != 'true'
        run: chmod +x build.ci.sh inject-version.sh && ./inject-version.sh
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Build
        if: steps.brand-filter.outputs.skip != 'true'
        run: |
          chmod +x build.ci.sh inject-version.sh && ./build.ci.sh
        env:
          RUN_BUILD_ONLY: true
          ENVIRONMENT: ${{ matrix.environment }}
          BRAND: ${{ matrix.brand }}
          PLATFORM: ios
          SKIP_TESTFLIGHT: ${{ github.event_name != 'push' && 'true' || 'false' }}
